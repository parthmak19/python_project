<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>form</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}" />
  </head>
  <body>
    <div class="main">
      <div class="register">
        <h2>Signup Here</h2>
        <form id="register" method="post">
          <label>User Name: </label><br />
          <input
            type="text"
            name="username"
            id="username"
            placeholder="Enter your User Name"
          /><br />
          <label>Full Name: </label><br />
          <input
            type="text"
            name="first_name"
            id="fname"
            placeholder="Enter your Full Name"
          /><br />
          <label>Email ID: </label><br />
          <input
            type="email"
            name="email_id"
            id="email"
            placeholder="Enter your Email ID"
          /><br />
           <label>Contact Number: </label><br />
          <input
            type="phone2numeric"
            name="phone2numeric"
            id="Contact Number"
            placeholder="Enter your Contact info"
          /><br />
         
          <label>Password: </label><br />
          <input
            type="Password"
            name="Password"
            id="Password"
            placeholder="Enter your Password"
          /><br />
          <label> Confirm Password: </label><br />
          <input type="password" 
            id="Password"  
            name="Password" 
          /><br />
          <input type="submit" />
        </form>
      </div>
    </div>
  </body>
</html>
