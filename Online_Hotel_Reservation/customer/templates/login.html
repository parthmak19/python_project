<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>form</title>
    {% load static %}
    <link rel="stylesheet" type="text/css" href="{% static 'login.css' %}" />
  </head>
  <body>
    <div class="main">
      <div class="register">
        <h2>Login Here</h2>
        <form id="register" method="post">
          {% csrf_token %}
          <label>User Name: </label><br />
          <input
            type="text"
            name="username"
            id="username"
            placeholder="Enter your User Name"
          /><br />

          <label>Password: </label><br />
          <input
            type="Password"
            name="Password"
            id="Password"
            placeholder="Enter your Password"
          /><br />
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              value=""
              id="flexCheckDefault"
            />
            <label class="form-check-label" for="flexCheckDefault">
              Remember Me
            </label>
          </div>
         
          <input type="submit" />
        </form>
      </div>
    </div>
  </body>
</html>
